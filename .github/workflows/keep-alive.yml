name: Keep Alive

on:
  schedule:
    # Toutes les 48h — 8h00 UTC les jours pairs
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/services?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"

      - name: Commit automatique
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u)" > .keep-alive
          git add .keep-alive
          git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d')"
          git push
