<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2c5c26" />
    <meta name="description" content="Planning Viewer - Consultation sécurisée de documents" />

    <!-- PWA -->
    

    <!-- iOS PWA -->
    
    
    
    

    <!-- Sécurité -->
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <title>Planning Viewer</title>

    <style>
      /* Écran de chargement initial — couleurs Soignon */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #2c5c26;
        background-image: linear-gradient(160deg, #3d7a35 0%, #2c5c26 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      .init-logo {
        width: 56px;
        height: 56px;
        background: rgba(212,168,75,0.18);
        border: 1.5px solid rgba(212,168,75,0.35);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .init-logo img {
        height: 62px;
        margin-top: 6px;
        mix-blend-mode: lighten;
        opacity: 0.92;
      }
      .init-spinner {
        width: 26px;
        height: 26px;
        border: 2px solid rgba(255,255,255,0.12);
        border-top-color: #d4a84b;
        border-radius: 50%;
        animation: s 0.8s linear infinite;
      }
      @keyframes s { to { transform: rotate(360deg); } }
      .init-text {
        font-family: sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <!-- Loader initial -->
    <div id="initial-loader">
      <div class="init-logo">
        <img src="/tete-chevre.png" alt="" />
      </div>
      <div class="init-spinner"></div>
      <span class="init-text">Planning Viewer</span>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader')
          if (loader) {
            loader.classList.add('hidden')
            setTimeout(() => loader.remove(), 300)
          }
        }, 500)
      })

      // Protection globale anti-copie
      document.addEventListener('copy', (e) => {
        const selection = window.getSelection()?.toString()
        if (selection && document.querySelector('.viewer-page')) {
          e.preventDefault()
        }
      })
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
